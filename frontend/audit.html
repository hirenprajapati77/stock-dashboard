<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Audit Logs</title>
    <style>
        body {
            background-color: #0f172a; /* Tailwind slate-900 */
            color: #10b981; /* green text */
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            overflow-x: hidden;
        }
        h1 {
            color: #f8fafc;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
            font-size: 1.2rem;
            display: flex;
            justify-content: space-between;
        }
        #controls {
            font-size: 0.9rem;
            color: #94a3b8;
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.85rem;
            line-height: 1.4;
        }
        button {
            background: #1e293b;
            color: #e2e8f0;
            border: 1px solid #334155;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #334155; }
    </style>
</head>
<body>
    <h1><span>Terminal Audit Logs</span> <span id="controls"><span id="status">Polling...</span> | Auto-clears every 1h</span></h1>
    <pre id="logs">Loading logs...</pre>

    <script>
        let autoScroll = true;

        window.addEventListener('scroll', () => {
            const isBottom = window.innerHeight + window.scrollY >= document.body.offsetHeight - 50;
            autoScroll = isBottom;
        });

        async function fetchLogs() {
            try {
                const response = await fetch('/api/v1/internal/audit');
                if (!response.ok) throw new Error('API Error');
                const data = await response.json();
                
                const logContainer = document.getElementById('logs');
                if (data.logs.length === 0) {
                    logContainer.textContent = "No logs yet or logs were recently cleaned.";
                } else {
                    logContainer.textContent = data.logs.join('\n');
                }
                
                document.getElementById('status').textContent = 'Live';
                document.getElementById('status').style.color = '#10b981';

                if (autoScroll) {
                    window.scrollTo(0, document.body.scrollHeight);
                }
            } catch (err) {
                document.getElementById('status').textContent = 'Disconnected';
                document.getElementById('status').style.color = '#ef4444';
            }
        }

        // Fetch immediately and poll every 2 seconds
        fetchLogs();
        setInterval(fetchLogs, 2000);
    </script>
</body>
</html>
