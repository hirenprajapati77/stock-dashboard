<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&R Pro - Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0e11;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(37, 99, 235, 0.05) 0%, transparent 40%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #eaecef;
        }

        .glass-card {
            background: rgba(23, 27, 34, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            position: relative;
            z-index: 10;
        }

        .glow-effect {
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, #3b82f6, transparent, #2563eb);
            z-index: -1;
            border-radius: 26px;
            opacity: 0.3;
            filter: blur(8px);
        }

        .input-group input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }

        .btn-login {
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
            filter: brightness(1.1);
        }

        .logo-font {
            font-weight: 800;
            background: linear-gradient(to right, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="glow-effect"></div>
        
        <div class="text-center mb-10">
            <h1 class="text-3xl logo-font mb-2">S&R PRO</h1>
            <p class="text-gray-400 text-xs uppercase tracking-[0.2em]">Institutional Terminal</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div class="input-group">
                <label class="block text-[10px] uppercase tracking-widest text-gray-500 font-bold mb-2">User Identification</label>
                <input type="text" id="username" required 
                    class="w-full px-4 py-3 rounded-xl text-sm" placeholder="Admin">
            </div>

            <div class="input-group">
                <label class="block text-[10px] uppercase tracking-widest text-gray-500 font-bold mb-2">Security Password</label>
                <input type="password" id="password" required 
                    class="w-full px-4 py-3 rounded-xl text-sm" placeholder="••••••••">
            </div>

            <div class="flex items-center justify-between text-[10px] uppercase tracking-widest font-bold">
                <label class="flex items-center gap-2 cursor-pointer text-gray-400 hover:text-gray-300">
                    <input type="checkbox" id="remember" class="w-3 h-3 rounded bg-white/5 border-white/10 text-blue-600 focus:ring-0">
                    Remember Me
                </label>
                <a href="#" class="text-blue-500 hover:text-blue-400">Forgot Code?</a>
            </div>

            <div id="error-msg" class="text-red-500 text-[10px] font-bold text-center hidden">
                INVALID CREDENTIALS. ACCESS DENIED.
            </div>

            <button type="submit" class="btn-login w-full py-4 rounded-xl text-xs text-white">
                Authorize Access
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-[9px] text-gray-600 uppercase tracking-widest">&copy; 2026 S&R Analytics. Secure Session.</p>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const errorMsg = document.getElementById('error-msg');

            try {
                const res = await fetch('/api/v1/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, remember })
                });

                const data = await res.json();
                if (data.status === 'success') {
                    // Redirect to dashboard
                    window.location.href = '/';
                } else {
                    errorMsg.classList.remove('hidden');
                    errorMsg.innerText = data.message || "INVALID CREDENTIALS. ACCESS DENIED.";
                }
            } catch (err) {
                errorMsg.classList.remove('hidden');
                errorMsg.innerText = "AUTHENTICATION SERVER OFFLINE.";
            }
        });
    </script>
</body>
</html>
